  <!-- Force fetch latest version on new deployments -->
  <script>
    // Version check for cache busting
    (function() {
      const APP_VERSION = '2026020301'; // Update this with each deployment
      const STORED_VERSION = localStorage.getItem('topscoreai_version');
      
      if (STORED_VERSION && STORED_VERSION !== APP_VERSION) {
        // New version detected - clear caches and reload
        console.log('New version detected. Clearing caches...');
        
        // Clear service worker caches
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }
        
        // Unregister service workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
        }
        
        // Store new version and reload
        localStorage.setItem('topscoreai_version', APP_VERSION);
        
        // Force hard reload after a brief delay
        setTimeout(function() {
          window.location.reload(true);
        }, 100);
      } else if (!STORED_VERSION) {
        // First visit - store version
        localStorage.setItem('topscoreai_version', APP_VERSION);
      }
    })();
  </script>
